<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đặt sân</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">⚽ ĐẶT SÂN BÓNG</div>

<div class="menu">
  <div class="box red" onclick="uudai()">🔥 Ưu đãi</div>
  <div class="box blue" onclick="datnhanh()">⚡ Đặt nhanh</div>
  <div class="box green" onclick="giare()">💰 Giá rẻ</div>
</div>

<div class="search">
  <input id="ten" placeholder="Tên sân">
  <input id="khuvuc" placeholder="Khu vực">
  <button onclick="tim()">Tìm</button>
</div>

<div id="list" class="list"></div>

<!-- popup đặt -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h3>Đặt sân</h3>
    <input id="khach" placeholder="Tên khách">
    <input id="sdt" placeholder="SĐT">
    <input type="date" id="ngay">

    <select id="gio">
      <option>17:00</option>
      <option>18:00</option>
      <option>19:00</option>
    </select>

    <button onclick="thanhtoan()">Thanh toán</button>
    <button onclick="dong()">Đóng</button>
  </div>
</div>

<!-- popup thanh toán -->
<div class="popup" id="pay">
  <div class="popup-box">
    <h3>Thanh toán MoMo</h3>
    <p>Quét mã</p>
    <img src="https://www.facebook.com/94f5a9e7-e330-4667-9e16-6d8aea57c6ba" width="100%">
    <button onclick="xacnhan()">Đã thanh toán</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
